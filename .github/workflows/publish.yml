name: Publish Packages

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  CONFIGURATION: Release
  MINVERBUILDMETADATA: build.${{ github.run_number }}
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  PACKAGES_DIR: ./artifacts/packages-results

jobs:
  build:
    name: Build, test, and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: ./global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source github.com --username xshaheen --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --configfile nuget.config

      - name: Restore
        run: dotnet restore headless-sdk.slnx -p:RestorePackagesWithLockFile=false -p:RestoreLockedMode=false

      - name: Build
        run: dotnet build headless-sdk.slnx --configuration "${{ env.CONFIGURATION }}" --no-restore --no-incremental -v:q -nologo /clp:ErrorsOnly

      - name: Test
        run: dotnet test headless-sdk.slnx --configuration "${{ env.CONFIGURATION }}" --no-restore --no-build --logger "trx;LogFilePrefix=headless-sdk" --results-directory ./artifacts/test-results

      - name: Pack
        run: dotnet pack headless-sdk.slnx --configuration "${{ env.CONFIGURATION }}" --no-restore --output "${{ env.PACKAGES_DIR }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-results
          path: ./artifacts/test-results
          if-no-files-found: ignore

      - name: Upload packages
        uses: actions/upload-artifact@v7.0.1
        with:
          name: packages
          path: ${{ env.PACKAGES_DIR }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment:
      name: GitHub Packages
      url: https://github.com/xshaheen/headless-sdk/packages

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: ./artifacts/packages-results

      - name: Publish packages to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          packages=(./artifacts/packages-results/*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in ./artifacts/packages-results."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://nuget.pkg.github.com/xshaheen/index.json" \
              --api-key "$GITHUB_TOKEN" \
              --skip-duplicate
          done
