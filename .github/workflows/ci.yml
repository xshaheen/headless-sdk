name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - "Directory.*"
      - "global.json"
      - "headless-sdk.slnx"
      - "nuget.config"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - "Directory.*"
      - "global.json"
      - "headless-sdk.slnx"
      - "nuget.config"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  CONFIGURATION: Release
  MINVERBUILDMETADATA: build.${{ github.run_number }}
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  PACKAGES_DIR: ./artifacts/packages-results

jobs:
  validate:
    name: Build, test, and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: ./global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source github.com --username xshaheen --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --configfile nuget.config

      - name: Restore
        run: dotnet restore headless-sdk.slnx -p:RestorePackagesWithLockFile=false -p:RestoreLockedMode=false

      # Refresh the injected test-tool versions from Directory.Packages.props before build/pack so a
      # Dependabot bump of the central pins flows into the shipped assets without a manual edit.
      - name: Sync injected test-tool versions
        run: dotnet msbuild src/Headless.NET.Sdk/Headless.NET.Sdk.csproj -t:GenerateHeadlessTestToolVersions -nologo

      - name: Build
        run: dotnet build headless-sdk.slnx --configuration "${{ env.CONFIGURATION }}" --no-restore --no-incremental -v:q -nologo /clp:ErrorsOnly

      - name: Test
        # Microsoft Testing Platform runner (global.json "test.runner"). The integration project
        # references the Microsoft.Testing.Extensions.TrxReport and .CodeCoverage packages, so
        # everything after "--" is forwarded to the platform: --report-trx for the trx, --coverage
        # (cobertura) for code coverage, and --results-directory to pin both to a known path.
        run: dotnet test headless-sdk.slnx --configuration "${{ env.CONFIGURATION }}" --no-restore --no-build -- --report-trx --coverage --coverage-output-format cobertura --results-directory ./artifacts/test-results

      - name: Pack
        run: dotnet pack headless-sdk.slnx --configuration "${{ env.CONFIGURATION }}" --no-restore --output "${{ env.PACKAGES_DIR }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-results
          path: ./artifacts/test-results
          if-no-files-found: ignore

      # Coverage of the C# harness that drives the SDK props/targets, NOT of the shipped MSBuild
      # assets themselves -- a numeric coverage gate would be low value here, so we collect and
      # upload only and never fail the build on a threshold.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage
          path: |
            ./artifacts/test-results/**/*.cobertura.xml
            ./artifacts/test-results/**/*.coverage
          if-no-files-found: warn

      - name: Upload packages
        uses: actions/upload-artifact@v7.0.1
        with:
          name: packages
          path: ${{ env.PACKAGES_DIR }}
          if-no-files-found: error
